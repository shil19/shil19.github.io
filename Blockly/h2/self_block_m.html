/**/
Blockly.Blocks['block_move'] = {
  init: function() {
    this.appendDummyInput()
        .appendField(new Blockly.FieldDropdown([["向上","OP_up"], ["向下","OP_down"], ["向左","OP_left"], ["向右","OP_right"]]), "move");
    this.appendValueInput("steps")
        .setCheck(null)
        .appendField("移動");
    this.appendDummyInput()
        .appendField("步");  
    this.setInputsInline(true);
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour(65);
 this.setTooltip("");
 this.setHelpUrl("");
  }
};
Blockly.JavaScript['block_move'] = function(block) {
  var dropdown_move = block.getFieldValue('move');
  var value_steps = Blockly.JavaScript.valueToCode(block, 'steps', Blockly.JavaScript.ORDER_ATOMIC);
  // TODO: Assemble JavaScript into code variable.
  //var code = 'move("' + dropdown_move +'",' + value_steps +');';
  var code = 'move("' + dropdown_move +'",' + '0' +'); for (i=1;i<='+value_steps+';i++) { move("' + dropdown_move +'",' + '1' +'); }';
  return code;
};

/**/

Blockly.JavaScript['power'] = function(block) {
  var value_b = Blockly.JavaScript.valueToCode(block, 'b', Blockly.JavaScript.ORDER_ATOMIC);

        </block>

        <block type="controls_repeat_ext" id="repeat" inline="true">
          <value name="TIMES">
            <block type="math_number">
              <field name="NUM">2</field>
            </block>
          </value>
          <statement name="DO">

    function initApi(interpreter, scope) {
      // Add an API function for the alert() block, generated for "text_print" blocks.
      interpreter.setProperty(scope, 'alert',
          interpreter.createNativeFunction(function(text) {
        text = text ? text.toString() : '';
        outputArea.value += '\n' + text;
      }));
//
      interpreter.setProperty(scope, 'move',
          interpreter.createNativeFunction(function(text1,text2) {
        //text1 = text1 ? text.toString() : '';
        //text2 = text2 ? text.toString() : '';
        paintImg(text1,text2);
      }));
//
      // Add an API function for the prompt() block.
      var wrapper = function(text) {
        text = text ? text.toString() : '';
        return interpreter.createPrimitive(prompt(text));
      };
      interpreter.setProperty(scope, 'prompt',
          interpreter.createNativeFunction(wrapper));

      // Add an API function for highlighting blocks.
      var wrapper = function(id) {
        id = id ? id.toString() : '';
        return interpreter.createPrimitive(highlightBlock(id));
      };
      interpreter.setProperty(scope, 'highlightBlock',
          interpreter.createNativeFunction(wrapper));
    } // initApi

  <script>
  function blocklyShow(){
     document.getElementById("blocklyDiv").style.display = 'inline-block';
     document.getElementById("outputDiv").style.display = 'none';
  }

  function outputShow(){
     document.getElementById("blocklyDiv").style.display = 'none';
     document.getElementById("outputDiv").style.display = 'inline-block';
  }

// 使用 window.matchMedia() 檢查媒體查詢狀態，並根據需要調用相應的函數
function handleScreenSizeChange(mql) {
  if (mql.matches) {
    // 媒體查詢符合條件，例如螢幕寬度大於 768px
     document.getElementById("blocklyDiv").style.display = 'inline-block';
     document.getElementById("outputDiv").style.display = 'inline-block';
  } else {
    // 媒體查詢不符合條件，例如螢幕寬度小於等於 768px
    outputShow(); // 調用顯示 output 的函數
  }
}

// 創建媒體查詢對象，監聽屏幕尺寸變化
var mql = window.matchMedia("(min-width: 768px)");

// 註冊媒體查詢變化時的事件處理函數
mql.addListener(handleScreenSizeChange);

// 初始化時，根據初始媒體查詢狀態執行一次處理函數
handleScreenSizeChange(mql);

  </script>
